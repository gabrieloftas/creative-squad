<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Personagem RPG</title>
    
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="ficha-personagem">

        <h1 class="titulo">Ficha de Personagem</h1>

        <img class="imagem-personagem"
            src="https://img.magnific.com/vetores-premium/personagens-coloridos-de-rpg-vetoriais_983400-256.jpg"
            alt="Imagem de um personagem de RPG">

        <div class="info">
            <h2>Informações</h2>

            <p><strong>Nome:</strong> Arkan</p>
            <p><strong>Classe:</strong> Guerreiro</p>
            <p><strong>Raça:</strong> Humano</p>
            <p><strong>Nível:</strong> 5</p>
        </div>

        <div class="atributos">
            <h2>Atributos</h2>

            <ul>
                <li>Força: 18</li>
                <li>Defesa: 14</li>
                <li>Agilidade: 10</li>
                <li>Mana: 5</li>
            </ul>
        </div>

    </div>

</body>

</html>
